image:
  repository: ghcr.io/keiailab/nodevitals
  tag: ""            # 기본은 Chart.appVersion
  pullPolicy: IfNotPresent

# 활성 tier 를 DaemonSet 하나로 합쳐 노드당 파드 1개로 배치한다. false 면
# tier 마다 DaemonSet 을 따로 띄운다(노드당 tier 수만큼 파드).
#
# 합치면 컨테이너가 하나뿐이라 securityContext 도 하나다 — smart 를 함께 켜면
# /proc·/sys 수집까지 root(+privileged)로 올라가므로, core 의 unprivileged 를
# 지켜야 하는 환경에서는 false 를 유지한다. gpu 를 함께 켜면 이미지는 NVML 이
# 링크된 gpu 변형으로 통일되고, GPU 가 없는 노드에서는 gpu collector 만
# 건너뛴다(에이전트가 경고 후 계속 — 다른 tier 는 정상 수집).
singlePod: false

# DaemonSet RollingUpdate 예산 — 미지정 시 k8s API 기본값 maxUnavailable=1 이
# 적용된다. 그 기본값의 실측 함정(2026-07-23, e121 하드웨어 사망 RCA): 노드 하나가
# NotReady 로 영구히 멈추면 그 노드의 파드는 Ready 에 결코 도달하지 못하고
# maxUnavailable=1 예산을 영구히 독점한다 — 롤아웃 컨트롤러가 나머지 정상 노드는
# *단 하나도* 건드리지 못한 채 전체가 조용히 정지한다(Helm --wait 타임아웃으로
# 뒤늦게 드러남, 그마저도 disableWait 를 켜면 안 보이게 된다 — HelmRelease
# 자체의 disableWait 설정과는 별개로 이 값도 함께 맞춰야 한다).
# 죽은 노드 하나가 있어도 나머지가 굴러가려면 최소 2 가 필요하다 — 죽은 노드가
# 1 을 영구히 먹어도 건강한 노드용으로 최소 1 이 남는다.
updateStrategy:
  maxUnavailable: 1

# 임베드된 node_exporter collector 로 node_* 전체 표면(실노드 기준 ~379 family)을
# 같은 엔드포인트에서 제공한다. 켜면 별도 node_exporter DaemonSet 이 불요해지고,
# 메트릭 이름·라벨·의미가 upstream 과 동일하므로 기존 대시보드와 알림 룰이
# 그대로 살아난다.
#
# hostNetwork 주의: /proc/net 은 마운트 경로가 아니라 *읽는 프로세스의 netns* 로
# 해석된다. 파드 네트워크에서 읽으면 호스트가 아니라 파드 자신의 인터페이스가
# 보이므로(eth0 하나), netdev/netclass/sockstat 을 제대로 수집하려면
# hostNetwork: true 가 필요하다 — upstream node_exporter 도 같은 이유로 그렇게 돈다.
nodeExporter:
  enabled: false
  # filesystem collector 는 호스트의 모든 마운트를 statfs 해야 하므로 호스트 루트를
  # 읽기전용으로 마운트한다(upstream node_exporter 차트와 동일). 이는 컨테이너에
  # **호스트 파일시스템 전체 읽기 권한**을 주는 것이므로, 디스크 사용량 메트릭이
  # 필요 없다면 false 로 두는 편이 권한 표면이 좁다.
  #
  # false 로 두면 에이전트가 filesystem collector 를 아예 끈다 — 마운트 없이
  # 켜두면 컨테이너 자신의 파일시스템을 재서 "노드 디스크 사용량"으로 내보내는,
  # 그럴듯하지만 다른 기계를 측정한 값이 되기 때문이다.
  mountRootFS: true
  # ansible textfile collector(node_smart_attr 등)가 쓰는 디렉터리. 비우면 미마운트.
  textfileDir: /var/lib/node_exporter/textfile_collector
  # diskstats collector 는 /run/udev/data 에서 디바이스 속성(모델·시리얼·DM 이름)을
  # 읽어 node_disk_device_mapper_info / node_disk_filesystem_info 를 만든다.
  # 없으면 "Failed to open directory, disabling udev device properties" 를 한 줄
  # 남기고 두 family 만 조용히 빠지므로, 기본으로 마운트한다.
  mountUdev: true
  # collector 켜고 끄기 전용. --collector.* / --no-collector.* 만 허용되며 그 외는
  # 기동 실패한다 — 이 목록은 ConfigMap 에서 오고, --path.* 를 뒤에서 덮으면 모든
  # 수치가 호스트가 아니라 이 파드를 측정한 값으로 조용히 바뀐다.
  # 예: ["--no-collector.zfs", "--no-collector.btrfs"]
  extraFlags: []

# dcgm-exporter 호환 DCGM_FI_* 표면. gpu tier 의 NVML 스냅샷에서 라이브
# dcgm-exporter 와 이름·HELP·타입·단위(MiB/mJ)·식별 라벨(gpu/UUID/pci_bus_id/
# device/modelName/Hostname/DCGM_FI_DRIVER_VERSION)이 동일한 18개 메트릭을
# 같은 /metrics 로 낸다. 켜면 별도 dcgm-exporter DaemonSet(gpu-operator 의
# dcgmExporter.enabled) 은퇴의 전제가 된다 — nodeExporter 임베드의 GPU 판.
#
# 미포함(의도): dcgm-exporter 가 kubelet pod-resources 소켓에서 붙이는
# container/namespace/pod 귀속 라벨. 미할당 GPU 는 빈 라벨이라 수집 결과가
# 동일하고, 실귀속은 pod-resources 클라이언트가 필요한 별도 증분이다.
# gpu tier 가 꺼져 있으면 무효(데이터 원천이 없다).
dcgmCompat:
  enabled: false

# 장기보존 다운샘플링(internal/history) — Prometheus scrape retention 을 훌쩍
# 넘겨 "이 GPU 3달/1년 사용률"에 답할 수 있게, 5분 평균 시계열을 노드 로컬
# 파일(bbolt)에 별도 보관한다. 노드별로 로컬 보관이라(중앙 집계 아님) 조회는
# 그 노드의 /v1/history/{metric} REST 엔드포인트로 한다.
#
# Ingest 는 매 tier 의 원본 샘플을 스캔하지만 disk 에는 metrics 목록에 있는
# 것만, 그것도 5분에 1점(평균)만 남는다 — 30초 간격 원본을 그대로 몇 년치
# 쌓는 게 아니다. hostPath 가 root 소유로 생성되므로(DirectoryOrCreate), 최소
# 권한 initContainer(chownImage, CAP_CHOWN 만 부여) 가 기동 시 1회 소유권을
# 넘겨받아 메인 컨테이너는 non-root 로 유지한다(smart tier 가 이미 root 인
# 경우는 예외 — 그때는 root 가 어차피 쓸 수 있어 chown 자체가 불필요).
history:
  enabled: false
  # 5년 — GPU 하드웨어 교체 주기 기준. 값 하나로 조정.
  retentionDays: 1825
  intervalMinutes: 5
  # 노드 상의 실제 경로. 파드 재시작(이미지 업그레이드/노드 재부팅)에도
  # 살아남아야 "장기보존"의 의미가 있어 hostPath — PVC 는 DaemonSet 의
  # 노드당-1 모델과 맞지 않는다.
  hostPath: /var/lib/nodevitals/history
  # 컨테이너 내부 마운트 경로 = config.yaml 의 history.dataDir 과 동일해야 한다
  # (configmap 템플릿이 이 값을 그대로 dataDir 로도 렌더).
  mountPath: /var/lib/nodevitals/history
  # 빈 목록이면 에이전트가 GPU 헬스 4종(util/mem/온도/전력)으로 기본 적용.
  metrics: []
  # chown -R 65532:65532 <mountPath> 1회 실행 후 종료하는 initContainer 이미지.
  # coreutils 갖춘 최소 이미지면 충분 — 메인 nodevitals 이미지(distroless, 셸
  # 없음)는 이 목적에 못 쓴다.
  chownImage: busybox:1.36.1

# hostNetwork 는 nodeExporter.enabled 시 자동으로 켜진다. 독립적으로 강제하려면 true.
hostNetwork: false

# tier 별 렌더 토글 + tier 고유 런타임 설정.
tiers:
  core:
    enabled: true
  gpu:
    enabled: false
    # NVIDIA 컨테이너 런타임을 RuntimeClass 로 노출하는 클러스터(gpu-operator 기본,
    # k3s 포함)에서는 이 값을 반드시 지정한다. 기본 런타임이 runc 이면
    # NVIDIA_VISIBLE_DEVICES env 만으로는 nvidia-container-runtime hook 이 발동하지
    # 않아 libnvidia-ml.so 가 주입되지 않고, 에이전트가
    # "nvml init: ERROR_LIBRARY_NOT_FOUND" 로 CrashLoop 한다.
    # 값 예: "nvidia" (kubectl get runtimeclass 로 실재 확인).
    # 빈 문자열이면 클러스터 기본 런타임 사용.
    runtimeClassName: ""
  smart:
    enabled: false
    # SMART 조회는 /host/dev 의 블록 디바이스 노드를 직접 open 한다. 디바이스
    # cgroup allowlist 가 비-privileged 컨테이너의 이 open 을 EPERM 으로 막으며
    # SYS_RAWIO/SYS_ADMIN capability 로는 우회되지 않는다. probeDevice 는 open
    # 실패를 조용히 skip 하도록 설계돼 있어, 이 값이 false 면 에러 없이 디바이스
    # 0개 = 시리즈 0 이 된다(무증상 실패). 실제 디스크 건강을 수집하려면 true.
    # smartctl_exporter 등 동종 exporter 와 동일한 요구사항이며, 네임스페이스는
    # PodSecurity privileged 를 허용해야 한다.
    privileged: false

intervalSeconds: 15

# 이벤트 룰 (기본 예시 — 사용자 override)
rules:
  - metric: load1
    device: cpu
    condition: load_high
    severity: warning
    threshold: 8.0
    enterFor: 3
    exitFor: 3

# smart tier 이벤트 룰 (device: "" = 와일드카드 — 동적 디스크 전체 대상, 사용자 override)
smartRules:
  - { metric: smart_pending_sectors,     device: "", condition: smart_pending_sectors,  severity: critical, threshold: 0,  enterFor: 1, exitFor: 1 }
  - { metric: smart_reallocated_sectors, device: "", condition: smart_reallocated,      severity: warning,  threshold: 0,  enterFor: 1, exitFor: 1 }
  - { metric: smart_offline_uncorrectable, device: "", condition: smart_offline_uncorrectable, severity: critical, threshold: 0, enterFor: 1, exitFor: 1 }
  - { metric: nvme_percentage_used,      device: "", condition: nvme_wearout,           severity: warning,  threshold: 90, enterFor: 1, exitFor: 1 }
  - { metric: nvme_critical_warning,     device: "", condition: nvme_critical_warning,  severity: critical, threshold: 0,  enterFor: 1, exitFor: 1 }

# gpu tier 이벤트 룰 (device: "" = 와일드카드 — 노드 내 GPU 전체 대상, 사용자 override)
gpuRules:
  - metric: gpu_temperature_celsius
    device: ""
    condition: gpu_hot
    severity: warning
    threshold: 85
    enterFor: 3
    exitFor: 3
  - metric: gpu_ecc_uncorrected_total
    device: ""
    condition: gpu_ecc_uncorrected
    severity: critical
    threshold: 0
    enterFor: 1
    exitFor: 1

# 고객 백엔드 webhook.
# secret 은 nodevitals-webhooks Kubernetes Secret 으로 렌더되고, 컨테이너에는
# WEBHOOK_SECRET_N env(secretKeyRef)로 주입되어 config 의 ${WEBHOOK_SECRET_N}
# placeholder 로 확장됩니다 — ConfigMap 에 평문으로 남지 않습니다.
# (values 파일 자체에는 secret 을 넣지 마시오 — --set/외부 secret store 를 사용하고,
#  values 를 GitOps 로 커밋하지 마시오.)
webhooks: []
#  - url: https://backend.example/hook
#    secret: "whsec_..."   # → Secret 으로 렌더, env 주입 (평문 ConfigMap 아님)

metrics:
  port: 9847

# Prometheus Operator discovery. Off by default (requires the ServiceMonitor
# CRD). When enabled, renders a headless Service + ServiceMonitor so the
# /metrics endpoint of every nodevitals pod is scraped out of the box.
serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}   # extra labels for your Prometheus' serviceMonitorSelector

resources:
  requests:
    cpu: 20m
    memory: 32Mi
  limits:
    memory: 64Mi
