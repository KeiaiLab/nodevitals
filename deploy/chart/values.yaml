image:
  repository: ghcr.io/nodevitals/nodevitals
  tag: ""            # 기본은 Chart.appVersion
  pullPolicy: IfNotPresent

# tier 별 DaemonSet 렌더 토글. v0.1 은 core 만 구현.
tiers:
  core:
    enabled: true
  gpu:
    enabled: false   # 후속 마일스톤
  smart:
    enabled: false   # 후속 마일스톤

intervalSeconds: 15

# 이벤트 룰 (기본 예시 — 사용자 override)
rules:
  - metric: load1
    device: cpu
    condition: load_high
    severity: warning
    threshold: 8.0
    enterFor: 3
    exitFor: 3

# 고객 백엔드 webhook (Secret 참조 권장 — 여기선 최소)
webhooks: []
#  - url: https://backend.example/hook
#    secret: ""

metrics:
  listenAddr: ":9847"

resources:
  requests:
    cpu: 20m
    memory: 32Mi
  limits:
    memory: 64Mi
